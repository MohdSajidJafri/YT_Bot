# ────────────────────────────────────────────────────────────
# Daily YouTube Short — fully automated CI/CD pipeline
# ────────────────────────────────────────────────────────────
# Trigger:
#   - Scheduled: runs every day at 10:00 UTC
#   - Manual:    via Actions tab → "Run workflow"
#
# Secrets required (repo → Settings → Secrets → Actions):
#   GROQ_API_KEY           Groq LLM
#   DEAPI_TOKEN            DeAPI.ai image generation
#   EDGE_TTS_VOICE         (optional) TTS voice override
#
#   YouTube OAuth (one per channel):
#   YT_CLIENT_ID           Shared OAuth client ID
#   YT_CLIENT_SECRET_VALUE Shared OAuth client secret
#   YT_REFRESH_TOKEN       Default channel token
#
#   Per-channel refresh tokens (for bilingual / multiple channels):
#   YT_REFRESH_TOKEN_HI    Hindi facts channel
#   YT_REFRESH_TOKEN_EN    English facts channel
#   YT_REFRESH_TOKEN_MYTH  Hindi mythology channel
#   YT_REFRESH_TOKEN_MYTH_2 Backup myth channel
# ────────────────────────────────────────────────────────────

name: Daily YouTube Short

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      channel:
        description: "Channel preset to run"
        required: true
        default: "ghost_stories"
        type: choice
        options:
          - ghost_stories
          - facts
          - hindi_myth
          - school_story
          - psych_tradeoff
          - history_micro
      topic:
        description: "Optional topic hint (leave blank for random)"
        required: false
        type: string
        default: ""
      privacy:
        description: "YouTube privacy setting"
        required: true
        default: "public"
        type: choice
        options:
          - private
          - unlisted
          - public

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.channel || 'default' }}
  cancel-in-progress: false

jobs:
  generate-short:
    name: "Generate & upload Short (${{ github.event.inputs.channel || 'ghost_stories' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Determine channel preset
        id: channel
        run: |
          CHANNEL="${{ github.event.inputs.channel }}"
          if [ -z "$CHANNEL" ]; then
            CHANNEL="ghost_stories"
          fi
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "Selected channel: $CHANNEL"

      - name: Restore story history
        id: cache-history
        uses: actions/cache/restore@v4
        with:
          path: output/history/
          key: story-history-${{ steps.channel.outputs.channel }}-${{ github.run_id }}
          restore-keys: |
            story-history-${{ steps.channel.outputs.channel }}-
            story-history-

      - name: Generate, render & upload Short
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: "llama-3.3-70b-versatile"
          DEAPI_TOKEN: ${{ secrets.DEAPI_TOKEN }}
          DEAPI_MODEL: "Flux_2_Klein_4B_BF16"
          DEAPI_IMAGE_WIDTH: 768
          DEAPI_IMAGE_HEIGHT: 768
          DEAPI_COOLDOWN: 10
          EDGE_TTS_VOICE: ${{ secrets.EDGE_TTS_VOICE || 'en-US-ChristopherNeural' }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET_VALUE: ${{ secrets.YT_CLIENT_SECRET_VALUE }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_REFRESH_TOKEN_HI: ${{ secrets.YT_REFRESH_TOKEN_HI }}
          YT_REFRESH_TOKEN_EN: ${{ secrets.YT_REFRESH_TOKEN_EN }}
          YT_REFRESH_TOKEN_MYTH: ${{ secrets.YT_REFRESH_TOKEN_MYTH }}
          YT_REFRESH_TOKEN_MYTH_2: ${{ secrets.YT_REFRESH_TOKEN_MYTH_2 }}
          SHORT_TOPIC: ${{ github.event.inputs.topic || '' }}
        run: |
          python scripts/run_short.py \
            --channel "${{ steps.channel.outputs.channel }}" \
            --upload \
            --privacy "${{ github.event.inputs.privacy || 'public' }}"

      - name: Save story history cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: output/history/
          key: story-history-${{ steps.channel.outputs.channel }}-${{ github.run_id }}

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-output-${{ steps.channel.outputs.channel }}-${{ github.run_id }}
          path: output/runs/
          retention-days: 3